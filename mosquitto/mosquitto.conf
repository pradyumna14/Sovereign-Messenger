# Mosquitto MQTT Broker Configuration
# For Sovereign Messenger local development
#
# Place this file at: mosquitto/mosquitto.conf
# Run: mosquitto -c mosquitto/mosquitto.conf

# ── WebSocket Listener ──────────────────────────────────
# The browser MQTT client connects over WebSocket on port 9001
listener 9001
protocol websockets

# ── Standard MQTT Listener ──────────────────────────────
# Optional: standard MQTT on port 1883 for debugging tools
listener 1883
protocol mqtt

# ── Security ────────────────────────────────────────────
# No authentication required (broker is untrusted relay)
allow_anonymous true

# ── Logging ─────────────────────────────────────────────
log_type all
log_dest stdout
connection_messages true

# ── Performance ─────────────────────────────────────────
max_queued_messages 1000
message_size_limit 65535
